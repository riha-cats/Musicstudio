# MusicStudio 메시지 설정 (MiniMessage 문법)
# 색상/서식: <red>, <green>, <yellow>, <gray>, <bold>, <gradient:red:blue> 등
#   https://docs.advntr.dev/minimessage/format.html
# 플레이스홀더: <key> 형식 (예: <name>, <count>). 값은 그대로 삽입되어 안전합니다.
# 명령어 인자 표기는 < > 대신 [ ] 사용 (MiniMessage 태그와 충돌 방지).
config-version: 2

prefix: "<light_purple>[MusicStudio]</light_purple> "

no-permission: "<red>권한이 없습니다."
player-only: "<red>플레이어만 사용할 수 있습니다."

command:
  help-header: "<aqua>===== 음악스튜디오 ====="
  help-create: "<yellow>/음악스튜디오 생성 [이름]</yellow> <gray>- 새 곡 생성"
  help-list: "<yellow>/음악스튜디오 목록</yellow> <gray>- 내 곡 목록 보기"
  help-open: "<yellow>/음악스튜디오 열기 [이름]</yellow> <gray>- 에디터 열기"
  help-rename: "<yellow>/음악스튜디오 이름변경 [기존] [새]</yellow> <gray>- 곡 이름 변경"
  help-disc: "<yellow>/음악스튜디오 음반 [이름]</yellow> <gray>- 음반으로 추출"
  help-delete: "<yellow>/음악스튜디오 삭제 [이름]</yellow> <gray>- 곡 삭제"
  create-success: "<green>곡 '<white><name></white>' 생성 완료. /음악스튜디오 열기 <name> 으로 편집하세요."
  create-name-invalid: "<red>이름은 1~<max>자, 공백 없이 입력하세요."
  create-name-taken: "<red>이미 같은 이름의 곡이 있습니다: <white><name>"
  create-limit: "<red>곡은 최대 <white><max></white>개까지 만들 수 있습니다."
  create-usage: "<yellow>사용법: /음악스튜디오 생성 [이름]"
  list-empty: "<gray>저장된 곡이 없습니다. /음악스튜디오 생성 [이름] 으로 만드세요."
  list-header: "<aqua>===== 곡 목록 (<count>) ====="
  list-entry: "<gray> - <white><name></white> <gray>(레이어 <layers>, 노트 <notes>)"
  not-found: "<red>곡을 찾을 수 없습니다: <white><name>"
  delete-success: "<green>곡 '<white><name></white>' 삭제 완료."
  delete-fail: "<red>삭제에 실패했습니다: <white><name>"
  delete-not-owner: "<red>본인 소유 곡만 삭제할 수 있습니다."
  delete-usage: "<yellow>사용법: /음악스튜디오 삭제 [이름]"
  rename-success: "<green>이름 변경: <white><old></white> → <white><new>"
  rename-taken: "<red>이미 같은 이름의 곡이 있습니다: <white><name>"
  rename-not-owner: "<red>본인 소유 곡만 이름을 변경할 수 있습니다."
  rename-usage: "<yellow>사용법: /음악스튜디오 이름변경 [기존이름] [새이름]"
  open-usage: "<yellow>사용법: /음악스튜디오 열기 [이름]"
  disc-usage: "<yellow>사용법: /음악스튜디오 음반 [이름]"
  disc-not-owner: "<red>본인 소유 곡만 음반으로 추출할 수 있습니다."
  disc-empty-song: "<red>빈 곡은 추출할 수 없습니다. 노트를 먼저 추가하세요."
  disc-success: "<green>♥ 음반 추출 완료: <white><name>"
  disc-cost-insufficient: "<red>재료가 부족합니다. (<white><item> x<amount></white> 필요)"

editor:
  no-notes: "<gray>재생할 노트가 없습니다."
  play-start: "<green>► 미리듣기 시작"
  play-stop: "<gray>■ 정지"
  copy-success: "<green>틱 <white><tick></white> 복사됨 (<white><count></white> 노트)."
  copy-empty: "<gray>틱 <white><tick></white>에 복사할 노트가 없습니다."
  paste-success: "<green>틱 <white><tick></white>에 <white><count></white> 노트 붙여넣음."
  paste-empty: "<gray>클립보드가 비었습니다. 먼저 복사하세요."
  max-tick: "<red>최대 곡 길이(<white><max></white>셀)에 도달했습니다."
  disc-extracted: "<green>♥ 음반 추출 완료: <white><name>"
  disc-empty: "<red>빈 곡은 추출할 수 없습니다."
  layer-deleted: "<green>레이어 <white><layer></white> 삭제됨."
  layer-min: "<red>마지막 레이어는 삭제할 수 없습니다."

disc:
  play-start: "<green>► 재생: <white><name>"
  play-stop: "<gray>■ 정지: <white><name>"
  not-found: "<red>곡 데이터를 찾을 수 없습니다(삭제되었을 수 있음)."
  empty: "<gray>빈 곡입니다. 노트를 먼저 추가하세요."

admin:
  help-header: "<aqua>===== 관리자 ====="
  help-import: "<yellow>/음악스튜디오 관리자 임포트 [파일.nbs]</yellow> <gray>- NBS 곡 임포트"
  help-reload: "<yellow>/음악스튜디오 관리자 리로드</yellow> <gray>- 곡/설정 리로드"
  import-success: "<green>임포트 완료: <white><name>"
  import-fail: "<red>임포트 실패: <white><error>"
  import-warning: "<gray> · <warning>"
  import-no-file: "<red>파일이 없습니다: <white><file>"
  import-list-header: "<aqua>임포트 가능한 파일:"
  import-list-entry: "<gray> - <white><file>"
  import-no-files: "<gray>import 폴더에 .nbs 파일이 없습니다."
  import-usage: "<yellow>사용법: /음악스튜디오 관리자 임포트 [파일명.nbs]"
  reload-success: "<green>곡/설정 데이터를 다시 불러왔습니다."
