# MusicStudio messages (English) — MiniMessage syntax
# Enable with "language: en_us" in config.yml
# While config-version is 0, missing keys get copied in from messages_ko_kr.yml
# on load, so you can translate the file in place. Keys you already translated
# are left untouched
config-version: 7

prefix: "<light_purple>[MusicStudio]</light_purple> "

no-permission: "<red>You don't have permission."
player-only: "<red>Players only."

editor:
  layer-move-selected: "<yellow>Selected the layer currently at position <white><layer></white>. Press F on a destination layer header."
  layer-move-cancelled: "<gray>Cancelled moving the layer at position <white><layer></white>."
  layer-moved: "<green>Moved the layer from position <white><from></white> to <white><to></white>."
  layer-move-invalid: "<red>That layer move is no longer valid."
  range-start: "<yellow>Tick <white><anchor_tick></white> is now the range start; it persists while scrolling."
  range-cancelled: "<gray>Cancelled the pending range start; completed selection was preserved."
  range-added: "<green>Added ticks <white><from>~<to></white> (<affected> ticks). <white><total></white> ticks selected."
  range-removed: "<yellow>Removed ticks <white><from>~<to></white> (<affected> ticks). <white><total></white> ticks selected."
  selection-cleared: "<gray>Cleared the completed tick selection and pending range start."
  copy-no-selection: "<red>Nothing selected. Shift+left click editor cells to pick a range."
  copy-no-notes: "<gray>The selected ticks contain no notes; the existing clipboard was preserved."
  copy-success: "<green>Copied <white><notes></white> notes from <white><ticks></white> selected ticks (<from>~<to>)."
  paste-target-set: "<aqua>Paste target set to tick <white><tick></white>. Now press Paste."
  paste-target-cleared: "<gray>Paste target cleared."
  paste-no-target: "<red>No paste target. Click a tick banner below to pick the spot first."
  paste-empty: "<gray>The clipboard is empty. Copy a selection first."
  paste-result: "<green>At tick <white><tick></white>: pasted <white><pasted></white>, skipped <white><skipped></white>."
