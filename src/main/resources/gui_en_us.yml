# MusicStudio GUI text (English) — MiniMessage syntax
# Enable with "language: en_us" in config.yml
# While config-version is 0, missing keys get copied in from gui_ko_kr.yml
# on load, so you can translate the file in place. Keys you already translated
# are left untouched
config-version: 3

editor:
  header:
    name: "<white>Layer <n>"
    name-muted: "<dark_gray>Layer <n>"
    name-moving: "<gold>Moving layer <n>"
    lore: ["<white>Current position: <n> / <total>", "<gray>Instrument: <instrument>", "<gray>Volume: <volume>%<muted>", "", "<yellow>Left: change instrument", "<yellow>Right: toggle mute", "<yellow>Shift+Left/Right: volume ±10%", "<aqua>F: select this layer to move / move the selected layer here", "<red>Q (drop): delete layer"]
    lore-moving: ["<gold>Moving layer <n>", "<white>Current position: <n> / <total>", "<gray>Press F on another layer header to move here", "<gray>Press F again on this header to cancel"]
  # <song>
  title: "<light_purple>♪ <song>"
  empty-cell:
    name: "<dark_gray>·"
    lore: ["<dark_gray>Tick <tick> / Layer <layer>", "<gray>Left click: create <key_name>", "<aqua>F: range start/end", "<aqua>1 copy · 2 paste · 3 clear · Q cancel start"]
  info:
    name: "<light_purple>♪ <song>"
    lore: ["<gray>Tempo: <tempo> ticks/cell", "<gray>Length: <length> cells / <notes> notes", "<gray>Layers: <layers> / <max_layers>", "<aqua>New note: <key_name>", "<aqua>Selected ticks: <selected_ticks> · Range start: <anchor_tick>"]
  ruler:
    name: "<gray>Tick <tick>"
    lore: ["<gray>Click: mark this ruler position", "<gray>This is not used for copy or paste"]
  ruler-cursor:
    name: "<yellow>▼ Tick <tick> (ruler marker)"
    lore: ["<gray>Currently marked ruler position", "<gray>Paste uses the hovered editor cell", "<gray>Click again to clear"]
  ruler-anchor:
    name: "<gold>◆ Tick <tick> (range start)"
    lore: ["<gray>Press F on another editor cell to finish", "<gray>Press Q on an editor cell to cancel only the start"]
  buttons:
    range-help:
      name: "<white>Tick range controls"
      lore: ["<yellow>F: range start / end", "<yellow>1: copy selected ticks", "<yellow>2: paste at hovered tick", "<yellow>3: clear selection", "<yellow>Q: cancel pending start", "<gray><selected_ticks> ticks selected · start <anchor_tick>"]
    edit-help:
      name: "<white>Range selection help"
      lore: ["<gray>Ranges can span scrolling.", "<gray>Empty ticks and multiple non-contiguous ranges work.", "<gray>Press F twice on one tick to select that tick."]
