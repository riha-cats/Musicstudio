# MusicStudio GUI text (English) — MiniMessage syntax
# Enable with "language: en_us" in config.yml
# While config-version is 0, missing keys get copied in from gui_ko_kr.yml
# on load, so you can translate the file in place. Keys you already translated
# are left untouched
config-version: 8

editor:
  header:
    name: "<white>Layer <n>"
    name-muted: "<dark_gray>Layer <n>"
    name-moving: "<gold>Moving layer <n>"
    lore: ["<white>Current position: <n> / <total>", "<gray>Instrument: <instrument>", "<gray>Volume: <volume>%<muted>", "", "<yellow>Left: change instrument", "<yellow>Right: toggle mute", "<yellow>Shift+Left/Right: volume ±10%", "<aqua>F: select this layer to move / move the selected layer here", "<red>Q (drop): delete layer"]
    lore-moving: ["<gold>Moving layer <n>", "<white>Current position: <n> / <total>", "<gray>Press F on another layer header to move here", "<gray>Press F again on this header to cancel"]
  # <song>
  title: "<light_purple>♪ <song>"
  empty-cell:
    name: "<dark_gray>·"
    lore: ["<dark_gray>Tick <tick> / Layer <layer>", "<gray>Left click: create <key_name>", "<aqua>Shift+left click: range start/end"]
  note:
    lore: ["<aqua>Note: <key_name> (key <key>)", "<gray>Tick <tick> / Layer <layer>", "", "<yellow>Left click: select (copies this pitch)", "<yellow>Right click: +1 / Shift+right: -1", "<aqua>Shift+left click: range start/end", "<red>Q (drop): delete"]
  info:
    name: "<light_purple>♪ <song>"
    lore: ["<gray>Tempo: <tempo> ticks/cell", "<gray>Length: <length> cells / <notes> notes", "<gray>Layers: <layers> / <max_layers>", "<aqua>New note: <key_name>", "<aqua>Selected ticks: <selected_ticks> · Range start: <anchor_tick>"]
  ruler:
    name: "<white>Tick <tick>"
    lore: ["<gray>Click: paste here (turns blue)", "<dark_gray>Shift+left click editor cells to select"]
  ruler-paste:
    name: "<aqua>▼ Tick <tick> (paste here)"
    lore: ["<gray>The Paste button lands here", "<dark_gray>Click again to clear"]
  ruler-selected:
    name: "<yellow>■ Tick <tick> (selected)"
    lore: ["<gray>Copy will take this tick", "<dark_gray>Right click Copy to clear all"]
  ruler-anchor:
    name: "<gold>◆ Tick <tick> (range start — waiting for end)"
    lore: ["<gray>Shift+left click another editor cell to select everything between", "<dark_gray>Right click Copy to cancel"]
  buttons:
    copy:
      name: "<white>Copy"
      lore: ["<gray>Copies the selected cells", "<gray>Right click: clear the whole selection", "<dark_gray>Shift+left click twice on cells to pick a range", "<gray><selected_ticks> ticks selected · pending start <anchor_tick>"]
    paste:
      name: "<white>Paste"
      lore: ["<gray>Lands on the blue banner", "<aqua>Paste tick: <paste_tick>", "<dark_gray>Click a tick banner to pick the spot"]
    output:
      name: "<light_purple>Extract disc"
      lore: ["<gray>Opens the extract menu", "<dark_gray>Check the price, then decide"]
    play:
      name: "<green>▶ Preview"
      lore: ["<gray>Only you hear it", "<gray>Press again to stop"]
    stop:
      name: "<red>■ Stop"
      lore: ["<gray>Stops the preview"]
    settings:
      name: "<gold>Settings"
      lore: ["<gray>Tempo"]

settings:
  title: "<gold>Settings — <song>"
  filler:
    name: "<dark_gray> "
  info:
    name: "<light_purple>♪ <song>"
    lore: ["<gray>Tempo: <tempo> ticks/cell (<cells_per_sec> cells/s)", "<gray>Length: <length> cells / <notes> notes", "<gray>Layers: <layers>"]
  tempo-down:
    name: "<red>◀ Slower"
    lore: ["<gray>+1 tick per cell", "<gray>Now: <tempo> ticks/cell", "<gray>Max <max>"]
  tempo-up:
    name: "<green>Faster ▶"
    lore: ["<gray>-1 tick per cell", "<gray>Now: <tempo> ticks/cell", "<gray>Min <min>"]
  tempo-reset:
    name: "<aqua>Reset tempo"
    lore: ["<gray>Back to <default> ticks/cell", "<gray>Now: <tempo> ticks/cell"]
  back:
    name: "<yellow>← Back to editor"
    lore: ["<gray>Return to the editor"]

output:
  title: "<light_purple>Extract disc — <song>"
  filler:
    name: "<dark_gray> "
  price:
    name: "<gold>Price: <item> x<amount>"
    lore: ["<gray>What it costs to press this song", "<gray><length> cells · <notes> notes · <layers> layers"]
  price-free:
    name: "<gold>Price: free"
    lore: ["<gray>This server charges nothing", "<gray><length> cells · <notes> notes · <layers> layers"]
  buy:
    name: "<green>Extract"
    lore: ["<gray>Click to receive the disc", "<dark_gray>Anyone holding it can play it"]
  back:
    name: "<yellow>← Back to editor"
    lore: ["<gray>Leave without extracting"]

song-list:
  title: "<dark_purple>♪ Music Studio"
  border:
    name: "<dark_gray> "
  entry:
    name: "<light_purple><bold>♪ <song>"
    lore: ["<yellow>▌ Left click to open", "<gray>▌", "<gray>▌ Size: <size>", "<gray>▌ Notes: <notes>"]
  page-info:
    name: "<aqua>Page <page> / <pages>"
    lore: ["<gray><total> songs"]
  prev-page:
    name: "<aqua>◀ Previous page"
    lore: ["<gray>Page <page> / <pages>"]
  next-page:
    name: "<aqua>Next page ▶"
    lore: ["<gray>Page <page> / <pages>"]
