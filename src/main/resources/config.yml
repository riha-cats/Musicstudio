# >>> DO NOT modify the config-version below manually! <<<
config-version: 5
# >>>>>>>>>>>>>>>>>>>>>>>>>><<<<<<<<<<<<<<<<<<<<<<<<<<<<<<

# Changing the language type below switches the language syntax.
# Supported language codes: ko_kr, en_us
language: ko_kr

# When enabled, MusicStudio checks for updates on server startup.
# If an update is available, admins will be notified in the server
# console and upon login.
update-check:
  enabled: true

limits:
  # Sets the maximum song length in ticks (per cell). (Default: 4096)
  max-ticks: 4096
  # Sets the maximum number of songs a player can create.
  # Players with musicstudio.admin are exempt from this limit.
  max-songs-per-player: 30
  # Sets the maximum number of layers per song. Max: 256. (Default: 9)
  max-layers: 9

disc:
  # Sets the base item for the music disc.
  # Used by default when disc.itemsadder-id is empty.
  material: MUSIC_DISC_STRAD

  # Uses the ItemsAdder custom item ID.
  # Used by default when disc.material is empty.
  # If ItemsAdder is not installed or the ID cannot be found,
  # it automatically falls back to material.
  itemsadder-id: ""


  # Vanilla item properties
  # Enchantment glint effect
  glint: false
  # Unbreakable (infinite durability)
  unbreakable: false
  # Applies the resource pack's custom model/texture ID.
  # 0 disables it; any positive value applies it. (Default: 0)
  custom-model-data: 0

  # Cost to extract a music disc. If set to false, extraction is free.
  cost:
    enabled: false
    # If type is ITEM, an item will be consumed.
    # If type is ECONOMY, money will be deducted via Vault integration.
    type: ITEM
    # Item to consume when type is ITEM
    item: EMERALD
    # Amount if type is ITEM, or price if type is ECONOMY
    amount: 5