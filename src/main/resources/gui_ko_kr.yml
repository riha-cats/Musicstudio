# =================================================================
# MusicStudio GUI 텍스트 (MiniMessage 문법)
# =================================================================
# 인벤토리 제목, 아이템 이름, lore 를 전부 여기서 바꿀 수 있습니다
# 기울임(italic)은 기본으로 꺼져 있고, <i>...</i> 로 감싼 부분만 기울여집니다
# <key> 플레이스홀더는 플러그인이 채워 넣습니다. 각 항목 주석 참고
config-version: 2

# =================================================================
# 에디터
# =================================================================
editor:
  # <song>
  title: "<light_purple>♪ <song>"

  header:
    # <n>=레이어번호, <layer_name>, <instrument>, <volume>, <muted>(음소거 표시), <total>
    name: "<white>레이어 <n>: <layer_name>"
    name-muted: "<dark_gray>레이어 <n>: <layer_name>"
    lore:
      - "<gray>악기: <instrument>"
      - "<gray>볼륨: <volume>%<muted>"
      - ""
      - "<yellow>좌클릭: 악기 변경"
      - "<yellow>우클릭: 음소거 토글"
      - "<yellow>Shift+좌/우클릭: 볼륨 ±10%"
      - "<red>Q키(드롭): 레이어 삭제"

  note:
    # <key_name>, <key>, <tick>, <layer>
    name: "<green><key_name>"
    name-selected: "<gold>★ <key_name>"
    lore:
      - "<aqua>음: <key_name> (key <key>)"
      - "<gray>틱 <tick> / 레이어 <layer>"
      - ""
      - "<yellow>좌클릭: 선택"
      - "<yellow>우클릭: 반음↑ / Shift+우클릭: 반음↓"
      - "<red>Shift+좌클릭: 삭제"

  empty-cell:
    # <tick>, <layer>, <key_name>(현재 음높이)
    name: "<dark_gray>·"
    lore:
      - "<dark_gray>틱 <tick> / 레이어 <layer>"
      - "<gray>좌클릭: <key_name> 노트 생성"
      - "<aqua>F: 틱 범위 시작/끝"
      - "<aqua>1 복사 · 2 붙여넣기 · 3 선택 해제 · Q 시작 취소"

  add-layer:
    name: "<green>+ 레이어 추가"
    lore:
      - "<gray>클릭하여 새 레이어 추가"

  info:
    # <song>, <tempo>, <length>, <notes>, <layers>, <max_layers>, <key_name>
    name: "<light_purple>♪ <song>"
    lore:
      - "<gray>템포: 셀당 <tempo>틱"
      - "<gray>길이: <length>셀 / 노트 <notes>개"
      - "<gray>레이어: <layers> / <max_layers>"
      - ""
      - "<aqua>새 노트 음높이: <key_name>"
      - "<aqua>선택 틱: <selected_ticks> · 범위 시작: <anchor_tick>"
      - "<yellow>좌클릭: 음↑ 우클릭: 음↓ (Shift: 옥타브)"

  # <tick>
  ruler:
    name: "<gray>틱 <tick>"
    lore:
      - "<gray>클릭: 이 틱에 눈금 위치 표시"
      - "<gray>복사와 붙여넣기에는 사용되지 않습니다"
  ruler-cursor:
    name: "<yellow>▼ 틱 <tick> (눈금 표시)"
    lore:
      - "<gray>현재 표시한 눈금 위치"
      - "<gray>붙여넣기는 마우스를 올린 편집 셀이 기준입니다"
      - "<gray>다시 클릭하면 해제"
  ruler-playing:
    name: "<green>▶ 틱 <tick>"
  ruler-anchor:
    name: "<gold>◆ 틱 <tick> (범위 시작)"
    lore: ["<gray>다른 편집 셀에서 F를 눌러 범위를 완성", "<gray>편집 셀에서 Q를 누르면 시작만 취소"]

  filler:
    name: "<dark_gray> "

  buttons:
    prev-tick:
      name: "<aqua>◀ 이전 틱"
      lore: [ "<gray>왼쪽으로 스크롤", "<gray>Shift: 8틱 점프" ]
    next-tick:
      name: "<aqua>다음 틱 ▶"
      lore: [ "<gray>오른쪽으로 스크롤", "<gray>Shift: 8틱 점프" ]
    up-layer:
      name: "<yellow>▲ 레이어 위"
      lore: [ "<gray>위 레이어 보기" ]
    down-layer:
      name: "<yellow>▼ 레이어 아래"
      lore: [ "<gray>아래 레이어 보기" ]
    play:
      name: "<green>▶ 미리듣기"
      lore: [ "<gray>나에게만 재생됩니다" ]
    stop:
      name: "<red>■ 정지"
      lore: [ "<gray>미리듣기 정지" ]
    settings:
      name: "<gold>설정"
      lore: [ "<gray>템포 · 음반 추출" ]
    range-help:
      name: "<white>틱 범위 편집 도움말"
      lore:
        - "<yellow>F: 범위 시작 / 끝"
        - "<yellow>1: 선택한 틱 복사"
        - "<yellow>2: 마우스를 올린 틱부터 붙여넣기"
        - "<yellow>3: 선택 전체 해제"
        - "<yellow>Q: 대기 중인 범위 시작 취소"
        - "<gray>선택 틱 <selected_ticks>개 · 시작 <anchor_tick>"
    edit-help:
      name: "<white>범위 선택 안내"
      lore:
        - "<gray>스크롤을 넘어 범위를 선택할 수 있습니다."
        - "<gray>빈 틱과 여러 비연속 구간도 선택됩니다."
        - "<gray>F를 같은 틱에 두 번 누르면 한 틱만 선택합니다."

# =================================================================
# 악기 선택 메뉴
# =================================================================
instrument:
  # <n>=레이어번호
  title: "<dark_aqua>악기 선택 — 레이어 <n>"
  # <instrument>
  entry:
    name: "<white><instrument>"
    lore: [ "<gray>클릭하여 선택" ]
  entry-current:
    name: "<gold><instrument>"
    lore: [ "<gold>현재 악기" ]

# =================================================================
# 설정 메뉴
# =================================================================
settings:
  # <song>
  title: "<gold>설정 — <song>"
  # <tempo>, <max>, <min>, <cells_per_sec>
  tempo-down:
    name: "<red>◀ 느리게"
    lore:
      - "<gray>셀당 틱 +1 (느려짐)"
      - "<gray>현재: 셀당 <tempo>틱"
      - "<gray>최대 <max>틱/셀"
  tempo-info:
    name: "<aqua>템포: 셀당 <tempo>틱"
    lore:
      - "<gray><cells_per_sec> 셀/초 (20 TPS 기준)"
  tempo-up:
    name: "<green>빠르게 ▶"
    lore:
      - "<gray>셀당 틱 -1 (빨라짐)"
      - "<gray>최소 <min>틱/셀"
  disc:
    name: "<light_purple>음반 추출"
    lore:
      - "<gray>이 곡을 음반으로 추출합니다."
      - "<gray>추출된 음반은 소지자 누구나 재생할 수 있습니다."
  back:
    name: "<yellow>← 에디터로"
    lore:
      - "<gray>편집 화면으로 돌아가기"

# =================================================================
# 음반 아이템
# =================================================================
disc:
  # <song>, <layers>, <notes>, <cells>
  name: "<light_purple>♪ <song>"
  lore:
    - "<dark_gray>MusicStudio 음반"
    - "<gray>레이어 <layers> · 노트 <notes> · <cells>셀"
    - ""
    - "<yellow>우클릭: 재생 / 다시 우클릭: 정지"
