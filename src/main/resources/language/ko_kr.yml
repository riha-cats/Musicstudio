# =================================================================
# MusicStudio 언어 파일 (ko_kr)
# =================================================================
# 이 파일은 플러그인이 켜질 때마다 덮어씁니다. 여기를 고치면 사라집니다
# 문구를 바꾸려면 messages.yml 에 바꿀 키만 적으세요
# 활성 언어는 config.yml 의 language 로 고릅니다
# 전부 MiniMessage 문법입니다

messages:
  prefix: "<light_purple>[MusicStudio]</light_purple> "

  no-permission: "<red>권한이 없습니다."
  player-only: "<red>플레이어만 사용할 수 있습니다."

  # =================================================================
  # 명령어
  # =================================================================
  command:
    help-header: "<aqua>===== 음악스튜디오 ====="
    help-create: "<yellow>/음악스튜디오 생성 [이름]</yellow> <gray>- 새 곡 생성"
    help-list: "<yellow>/음악스튜디오 목록</yellow> <gray>- 내 곡 목록 보기"
    help-open: "<yellow>/음악스튜디오 열기 [이름]</yellow> <gray>- 에디터 열기"
    help-rename: "<yellow>/음악스튜디오 이름변경 [기존] [새]</yellow> <gray>- 곡 이름 변경"
    help-disc: "<yellow>/음악스튜디오 음반 [이름]</yellow> <gray>- 음반으로 추출"
    help-delete: "<yellow>/음악스튜디오 삭제 [이름]</yellow> <gray>- 곡 삭제"
    create-success: "<green>곡 '<white><name></white>'을(를) 만들었습니다. /음악스튜디오 열기 <name> 으로 편집하세요."
    create-name-invalid: "<red>이름은 1~<max>자, 공백 없이 입력하세요."
    create-name-taken: "<red>같은 이름의 곡이 이미 있습니다: <white><name>"
    create-limit: "<red>곡은 최대 <white><max></white>개까지 만들 수 있습니다."
    create-usage: "<yellow>사용법: /음악스튜디오 생성 [이름]"
    list-empty: "<gray>저장된 곡이 없습니다. /음악스튜디오 생성 [이름] 으로 만드세요."
    list-header: "<aqua>===== 곡 목록 (<count>) ====="
    list-entry: "<gray> - <white><name></white> <gray>(레이어 <layers>, 노트 <notes>)"
    not-found: "<red>곡을 찾을 수 없습니다: <white><name>"
    delete-success: "<green>곡 '<white><name></white>'을(를) 삭제했습니다."
    delete-fail: "<red>삭제에 실패했습니다: <white><name>"
    delete-not-owner: "<red>본인 소유 곡만 삭제할 수 있습니다."
    delete-usage: "<yellow>사용법: /음악스튜디오 삭제 [이름]"
    rename-success: "<green>이름 변경: <white><old></white> → <white><new>"
    rename-taken: "<red>같은 이름의 곡이 이미 있습니다: <white><name>"
    rename-not-owner: "<red>본인 소유 곡만 이름을 변경할 수 있습니다."
    rename-usage: "<yellow>사용법: /음악스튜디오 이름변경 [기존이름] [새이름]"
    open-usage: "<yellow>사용법: /음악스튜디오 열기 [이름]"
    disc-usage: "<yellow>사용법: /음악스튜디오 음반 [이름]"
    disc-not-owner: "<red>본인 소유 곡만 음반으로 추출할 수 있습니다."
    disc-empty-song: "<red>빈 곡은 추출할 수 없습니다. 노트를 먼저 추가하세요."
    disc-success: "<green>음반 추출 완료: <white><name>"
    disc-cost-insufficient: "<red>재료가 부족합니다. (<white><item> x<amount></white> 필요)"

  # =================================================================
  # 에디터
  # =================================================================
  editor:
    layer-move-selected: "<yellow>현재 <white><layer></white>번 위치의 레이어를 선택했습니다. 목적지 레이어 헤더에서 F를 누르세요."
    layer-move-cancelled: "<gray><white><layer></white>번 위치 레이어의 이동을 취소했습니다."
    layer-moved: "<green>레이어를 <white><from></white>번 위치에서 <white><to></white>번 위치로 이동했습니다."
    layer-move-invalid: "<red>레이어를 이동할 수 없습니다. 위치가 더 이상 유효하지 않습니다."
    no-notes: "<gray>재생할 노트가 없습니다."
    play-start: "<green>▶ 미리듣기 시작"
    play-stop: "<gray>■ 정지"
    range-start: "<yellow>틱 <white><anchor_tick></white>을 범위 시작으로 잡았습니다. 끝낼 칸에서 Shift+좌클릭 하세요."
    range-cancelled: "<gray>대기 중인 범위 시작을 취소했습니다."
    range-added: "<green>틱 <white><from>~<to></white>를 추가했습니다 (<affected>틱). 총 <white><total></white>틱 선택됨."
    range-removed: "<yellow>틱 <white><from>~<to></white>를 제거했습니다 (<affected>틱). 총 <white><total></white>틱 선택됨."
    selection-cleared: "<gray>완료된 틱 선택과 대기 중인 범위 시작을 모두 지웠습니다."
    copy-no-selection: "<red>선택한 칸이 없습니다. 편집 칸에서 Shift+좌클릭으로 구간을 잡으세요."
    copy-no-notes: "<gray>선택한 틱에 노트가 없어 기존 클립보드를 유지했습니다."
    copy-success: "<green>선택한 <white><ticks></white>틱에서 노트 <white><notes></white>개를 복사했습니다. (<from>~<to>)"
    paste-target-set: "<aqua>틱 <white><tick></white>에 붙여넣도록 지정했습니다. 붙여넣기 버튼을 누르세요."
    paste-target-cleared: "<gray>붙여넣을 자리를 해제했습니다."
    paste-no-target: "<red>붙여넣을 자리가 없습니다. 아래 틱 배너를 클릭해 자리를 먼저 정하세요."
    tempo-reset: "<aqua>템포를 기본값(셀당 <white><tempo></white>틱)으로 되돌렸습니다."
    song-gone: "<red>그 곡은 이미 삭제되었습니다. 목록을 갱신했습니다."
    paste-empty: "<gray>클립보드가 비어 있습니다. 먼저 복사하세요."
    paste-result: "<green>틱 <white><tick></white> 기준으로 <white><pasted></white>개 붙여넣음, <white><skipped></white>개 건너뜀."
    max-tick: "<red>곡 최대 길이(<white><max></white>셀)에 도달했습니다."
    disc-extracted: "<green>음반 추출 완료: <white><name>"
    disc-empty: "<red>빈 곡은 추출할 수 없습니다."
    layer-deleted: "<green>레이어 <white><layer></white>를 삭제했습니다."
    layer-min: "<red>마지막 레이어는 삭제할 수 없습니다."

  # =================================================================
  # 음반 재생
  # =================================================================
  disc:
    play-start: "<green>▶ 재생: <white><name>"
    play-stop: "<gray>■ 정지: <white><name>"
    not-found: "<red>곡 데이터를 찾을 수 없습니다. 삭제된 곡일 수 있습니다."
    empty: "<gray>빈 곡입니다. 노트를 먼저 추가하세요."

  # =================================================================
  # 관리자
  # =================================================================
  admin:
    help-header: "<aqua>===== 관리자 ====="
    help-import: "<yellow>/음악스튜디오 관리자 임포트 [파일.nbs]</yellow> <gray>- NBS 곡 임포트"
    help-reload: "<yellow>/음악스튜디오 관리자 리로드</yellow> <gray>- 곡/설정 리로드"
    import-success: "<green>임포트 완료: <white><name>"
    import-fail: "<red>임포트 실패: <white><error>"
    import-warning: "<gray> · <warning>"
    import-no-file: "<red>파일이 없습니다: <white><file>"
    import-list-header: "<aqua>임포트 가능한 파일:"
    import-list-entry: "<gray> - <white><file>"
    import-no-files: "<gray>import 폴더에 .nbs 파일이 없습니다."
    import-usage: "<yellow>사용법: /음악스튜디오 관리자 임포트 [파일명.nbs]"
    reload-success: "<green>곡/설정 데이터를 다시 불러왔습니다."

  # =================================================================
  # 업데이트 알림
  # =================================================================
  update:
    available: "<yellow>새 버전 <white><latest></white> 이(가) 나왔습니다. (현재 <current>) <aqua><url>"

gui:
  editor:
    # <song>
    title: "<light_purple>♪ <song>"

    header:
      # <n>=레이어번호, <layer_name>, <instrument>, <volume>, <muted>(음소거 표시), <total>
      name: "<white>레이어 <n>"
      name-muted: "<dark_gray>레이어 <n>"
      name-moving: "<gold>이동 중인 레이어 <n>"
      lore:
        - "<white>현재 위치: <n> / <total>"
        - "<gray>악기: <instrument>"
        - "<gray>볼륨: <volume>%<muted>"
        - ""
        - "<yellow>좌클릭: 악기 변경"
        - "<yellow>우클릭: 음소거 토글"
        - "<yellow>Shift+좌/우클릭: 볼륨 ±10%"
        - "<aqua>F: 레이어 이동 시작 / 이동할 위치 선택"
        - "<red>Q키(드롭): 레이어 삭제"
      lore-moving:
        - "<gold>이동 중인 레이어 <n>"
        - "<white>현재 위치: <n> / <total>"
        - "<gray>F: 다른 레이어 헤더의 위치로 이동"
        - "<gray>같은 레이어에서 F: 이동 취소"

    note:
      # <key_name>, <key>, <tick>, <layer>
      name: "<green><key_name>"
      name-selected: "<gold>★ <key_name>"
      lore:
        - "<aqua>음: <key_name> (key <key>)"
        - "<gray>틱 <tick> / 레이어 <layer>"
        - ""
        - "<yellow>좌클릭: 선택 (이 음높이를 새 노트에 적용)"
        - "<yellow>우클릭: 반음↑ / Shift+우클릭: 반음↓"
        - "<aqua>Shift+좌클릭: 범위 선택 시작/끝"
        - "<red>Q키(드롭): 삭제"

    empty-cell:
      # <tick>, <layer>, <key_name>(현재 음높이)
      name: "<dark_gray>·"
      lore:
        - "<dark_gray>틱 <tick> / 레이어 <layer>"
        - "<gray>좌클릭: <key_name> 노트 생성"
        - "<aqua>Shift+좌클릭: 범위 선택 시작/끝"

    add-layer:
      name: "<green>+ 레이어 추가"
      lore:
        - "<gray>클릭하여 새 레이어 추가"

    info:
      # <song>, <tempo>, <length>, <notes>, <layers>, <max_layers>, <key_name>
      name: "<light_purple>♪ <song>"
      lore:
        - "<gray>템포: 셀당 <tempo>틱"
        - "<gray>길이: <length>셀 / 노트 <notes>개"
        - "<gray>레이어: <layers> / <max_layers>"
        - ""
        - "<aqua>새 노트 음높이: <key_name>"
        - "<aqua>선택 틱: <selected_ticks> · 범위 시작: <anchor_tick>"
        - "<yellow>좌클릭: 음↑ 우클릭: 음↓ (Shift: 옥타브)"

    # <tick>
    ruler:
      name: "<white>틱 <tick>"
      lore:
        - "<gray>클릭: 여기에 붙여넣기 (파란색으로 표시)"
        - "<dark_gray>선택은 편집 칸에서 Shift+좌클릭"
    ruler-selected:
      name: "<yellow>■ 틱 <tick> (선택됨)"
      lore:
        - "<gray>복사 버튼이 이 틱을 가져갑니다"
        - "<dark_gray>복사 버튼 우클릭으로 전체 해제"
    ruler-paste:
      name: "<aqua>▼ 틱 <tick> (여기에 붙여넣기)"
      lore:
        - "<gray>붙여넣기 버튼이 이 자리에 붙입니다"
        - "<dark_gray>다시 클릭하면 해제"
    ruler-playing:
      name: "<green>▶ 틱 <tick>"
    ruler-anchor:
      name: "<gold>◆ 틱 <tick> (범위 시작 — 끝점 대기 중)"
      lore: ["<gray>다른 편집 칸에서 Shift+좌클릭하면 그 사이가 전부 선택됩니다", "<dark_gray>복사 버튼 우클릭으로 취소"]

    filler:
      name: "<dark_gray> "

    buttons:
      prev-tick:
        name: "<aqua>◀ 이전 틱"
        lore: [ "<gray>왼쪽으로 스크롤", "<gray>Shift: 8틱 점프" ]
      next-tick:
        name: "<aqua>다음 틱 ▶"
        lore: [ "<gray>오른쪽으로 스크롤", "<gray>Shift: 8틱 점프" ]
      up-layer:
        name: "<yellow>▲ 레이어 위"
        lore: [ "<gray>위 레이어 보기" ]
      down-layer:
        name: "<yellow>▼ 레이어 아래"
        lore: [ "<gray>아래 레이어 보기" ]
      play:
        name: "<green>▶ 미리듣기"
        lore: [ "<gray>나에게만 재생됩니다", "<gray>다시 누르면 정지" ]
      stop:
        name: "<red>■ 정지"
        lore: [ "<gray>미리듣기를 멈춥니다" ]
      settings:
        name: "<gold>설정"
        lore: [ "<gray>템포" ]
      output:
        name: "<light_purple>음반 추출"
        lore: [ "<gray>추출 메뉴를 엽니다", "<dark_gray>가격을 확인하고 결정합니다" ]
      copy:
        name: "<white>복사"
        lore:
          - "<gray>선택한 칸을 복사합니다"
          - "<gray>우클릭: 선택 전체 해제"
          - "<dark_gray>편집 칸에서 Shift+좌클릭 두 번으로 구간 선택"
          - "<gray>선택 <selected_ticks>틱 · 대기 중 시작 <anchor_tick>"
      paste:
        name: "<white>붙여넣기"
        lore:
          - "<gray>파란 배너 자리에 붙여넣습니다"
          - "<aqua>붙여넣을 틱: <paste_tick>"
          - "<dark_gray>틱 배너를 클릭해 자리를 정하세요"

  # =================================================================
  # 곡 목록 (메인 GUI)
  # =================================================================
  song-list:
    title: "<dark_purple>♪ 음악 스튜디오"
    border:
      name: "<dark_gray> "
    # <song>, <size>=파일 크기, <notes>=노트 수(천단위 쉼표), <layers>, <length>
    entry:
      name: "<light_purple><bold>♪ <song>"
      lore:
        - "<yellow>▌ 좌클릭하여 열기"
        - "<gray>▌"
        - "<gray>▌ 크기: <size>"
        - "<gray>▌ 노트: <notes>개"
    # <page>=현재 쪽, <pages>=전체 쪽, <total>=곡 수
    page-info:
      name: "<aqua>페이지 <page> / <pages>"
      lore:
        - "<gray>곡 <total>개"
    prev-page:
      name: "<aqua>◀ 이전 페이지"
      lore: [ "<gray>페이지 <page> / <pages>" ]
    next-page:
      name: "<aqua>다음 페이지 ▶"
      lore: [ "<gray>페이지 <page> / <pages>" ]

  # =================================================================
  # 악기 선택 메뉴
  # =================================================================
  instrument:
    # <n>=레이어번호
    title: "<dark_aqua>악기 선택 — 레이어 <n>"
    # <instrument>
    entry:
      name: "<white><instrument>"
      lore: [ "<gray>클릭하여 선택" ]
    entry-current:
      name: "<gold><instrument>"
      lore: [ "<gold>현재 악기" ]

  # =================================================================
  # 설정 메뉴
  # =================================================================
  settings:
    # <song>
    title: "<gold>설정 — <song>"
    filler:
      name: "<dark_gray> "
    # <song>, <tempo>, <length>, <notes>, <layers>, <cells_per_sec>
    info:
      name: "<light_purple>♪ <song>"
      lore:
        - "<gray>템포: 셀당 <tempo>틱 (<cells_per_sec> 셀/초)"
        - "<gray>길이: <length>셀 / 노트 <notes>개"
        - "<gray>레이어: <layers>개"
    # <tempo>, <max>, <min>, <default>, <cells_per_sec>
    tempo-down:
      name: "<red>◀ 느리게"
      lore:
        - "<gray>셀당 틱 +1 (느려짐)"
        - "<gray>현재: 셀당 <tempo>틱"
        - "<gray>최대 <max>틱/셀"
    tempo-up:
      name: "<green>빠르게 ▶"
      lore:
        - "<gray>셀당 틱 -1 (빨라짐)"
        - "<gray>현재: 셀당 <tempo>틱"
        - "<gray>최소 <min>틱/셀"
    tempo-reset:
      name: "<aqua>템포 기본값"
      lore:
        - "<gray>셀당 <default>틱으로 되돌립니다"
        - "<gray>현재: 셀당 <tempo>틱"
    back:
      name: "<yellow>← 에디터로"
      lore:
        - "<gray>편집 화면으로 돌아가기"

  # =================================================================
  # 음반 추출 메뉴
  # =================================================================
  output:
    # <song>
    title: "<light_purple>음반 추출 — <song>"
    filler:
      name: "<dark_gray> "
    # <item>=비용 아이템, <amount>=개수, <length>, <notes>, <layers>
    price:
      name: "<gold>가격: <item> x<amount>"
      lore:
        - "<gray>이 곡을 음반으로 뽑는 데 드는 비용입니다"
        - "<gray>길이 <length>셀 · 노트 <notes>개 · 레이어 <layers>개"
    price-free:
      name: "<gold>가격: 무료"
      lore:
        - "<gray>이 서버는 추출 비용을 받지 않습니다"
        - "<gray>길이 <length>셀 · 노트 <notes>개 · 레이어 <layers>개"
    buy:
      name: "<green>추출하기"
      lore:
        - "<gray>클릭하면 음반을 받습니다"
        - "<dark_gray>추출한 음반은 누구나 재생할 수 있습니다"
    back:
      name: "<yellow>← 에디터로"
      lore:
        - "<gray>추출하지 않고 돌아가기"

  # =================================================================
  # 음반 아이템
  # =================================================================
  disc:
    # <song>, <layers>, <notes>, <cells>
    name: "<light_purple>♪ <song>"
    lore:
      - "<dark_gray>MusicStudio 음반"
      - "<gray>레이어 <layers> · 노트 <notes> · <cells>셀"
      - ""
      - "<yellow>우클릭: 재생 / 다시 우클릭: 정지"
